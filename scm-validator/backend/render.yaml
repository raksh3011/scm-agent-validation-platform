services:
  - type: web
    name: scm-validator-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      # Required for durability on Render's free plan (no persistent disk, and
      # local files are wiped on every restart/redeploy): point this at a free
      # Postgres instance (e.g. Neon or Supabase) and app/core/db.py switches
      # from local SQLite to Postgres automatically. Set the actual value in
      # the Render dashboard rather than committing a real connection string.
      - key: DATABASE_URL
        sync: false
