services:
  - type: web
    name: scm-validator-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: scm-validator-db
          property: connectionString
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1

databases:
  - name: scm-validator-db
    databaseName: scm_validator
    user: scm_admin
